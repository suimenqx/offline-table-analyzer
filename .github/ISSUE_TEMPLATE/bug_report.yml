name: Bug report
description: Report reproducible incorrect behavior or data loss
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not attach sensitive production data. Reduce inputs to a safe minimal reproduction.
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: 20.0.0
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and operating system
      placeholder: Firefox 128 on Windows 11
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include a sanitized minimal input where possible.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed passwords, tokens, personal data, and confidential table contents.
          required: true

